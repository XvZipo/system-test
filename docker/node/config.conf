# Docker Single-Node Config
#
# Used by docker-compose.yml tron-node service.
# This config matches testng.conf endpoints and genesis accounts.
# All ports, genesis, committee flags are aligned with docs/config.conf.

net { type = mainnet }

storage {
  balance.history.lookup = true
  db.version = 2
  db.sync = false
  db.directory = "database"
  index.directory = "index"
  transHistory.switch = "on"
  needToUpdateAsset = true
}

node.discovery = {
  enable = true
  persist = true
  bind.ip = ""
  external.ip = null
}

node.backup {
  port = 10001
  priority = 8
  members = []
}

node {
  trustNode = "127.0.0.1:50051"
  fullNodeAllowShieldedTransaction = true
  zenTokenId = 1000001
  walletExtensionApi = true
  openTransactionSort = true

  listen.port = 18889

  agreeNodeCount = 2
  connection.timeout = 2
  tcpNettyWorkThreadNum = 0
  udpNettyWorkThreadNum = 1
  connectFactor = 0.3
  activeConnectFactor = 0.1
  maxActiveNodes = 30
  minParticipationRate = 0
  disconnectNumberFactor = 0.4
  maxConnectNumberFactor = 0.8
  receiveTcpMinDataLength = 2048
  isOpenFullTcpDisconnect = true

  active = []

  p2p { version = 708 }

  http {
    fullNodePort = 8090
    solidityPort = 8091
    PBFTPort = 8098
    statisticsSRRewardSwitch = true
    fullNodeEnable = true
    solidityEnable = true
  }

  rpc {
    port = 50051
    solidityPort = 50061
    PBFTPort = 50071
    maxConnectionIdleInMillis = 60000
    minEffectiveConnection = 0
    reflectionService = true
  }

  jsonrpc {
    httpFullNodeEnable = true
    httpFullNodePort = 50545
    httpSolidityEnable = true
    httpSolidityPort = 50555
    httpPBFTEnable = true
    httpPBFTPort = 50565
  }

  disabledApi = [ "getstatsinfo" ]
}

seed.node = {
  ip.list = [ "127.0.0.1:18889" ]
}

