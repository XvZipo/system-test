# Multi-Node Config: Node 2 (SR2 - Venus)
#
# Usage:
#   bin/FullNode -c config-node2.conf --witness --es
#
# This node runs SR2. Pair with config-node1.conf for full dailyBuild coverage.
# Ports: gRPC 50052/50062/50072, HTTP 8092/8093/8099, JSON-RPC 50546/50556, P2P 18892
#
# IMPORTANT: Genesis block MUST be identical to Node 1.
#            Only localwitness, ports, storage paths, and needSyncCheck differ.

net { type = mainnet }

storage {
  balance.history.lookup = true
  db.version = 2
  db.sync = false
  db.directory = "database2"
  index.directory = "index2"
  transHistory.switch = "on"
  needToUpdateAsset = true
}

node.discovery = {
  enable = true
  persist = true
  bind.ip = ""
  external.ip = null
}

node.backup {
  port = 10002
  priority = 8
  members = []
}

node {
  trustNode = "127.0.0.1:50051"
  fullNodeAllowShieldedTransaction = true
  zenTokenId = 1000001
  walletExtensionApi = true
  openTransactionSort = true

  listen.port = 18892

  agreeNodeCount = 2
  connection.timeout = 2
  tcpNettyWorkThreadNum = 0
  udpNettyWorkThreadNum = 1
  connectFactor = 0.3
  activeConnectFactor = 0.1
  maxActiveNodes = 30
  minParticipationRate = 0
  disconnectNumberFactor = 0.4
  maxConnectNumberFactor = 0.8
  receiveTcpMinDataLength = 2048
  isOpenFullTcpDisconnect = true

  active = [
    "127.0.0.1:18889"
  ]

  p2p { version = 708 }

  http {
    fullNodePort = 8092
    solidityPort = 8093
    PBFTPort = 8099
    statisticsSRRewardSwitch = true
    fullNodeEnable = true
    solidityEnable = true
  }

  rpc {
    port = 50052
    solidityPort = 50062
    PBFTPort = 50072
    maxConnectionIdleInMillis = 60000
    minEffectiveConnection = 0
    reflectionService = true
  }

  jsonrpc {
    httpFullNodeEnable = true
    httpFullNodePort = 50546
    httpSolidityEnable = true
    httpSolidityPort = 50556
    httpPBFTEnable = true
    httpPBFTPort = 50566
  }

  disabledApi = [ "getstatsinfo" ]

  metrics {
    prometheus {
      enable = true
      port = "9529"
    }
  }
}

seed.node = {
  ip.list = [
    "127.0.0.1:18889",
    "127.0.0.1:18892"
  ]
}

