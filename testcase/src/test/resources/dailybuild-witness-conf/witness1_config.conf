node.discovery = {
  enable = true
  persist = true
  bind.ip = ""
  external.ip = null
}

node.backup {
  port = 10001
  priority = 8
  members = [
  ]
}

node.jsonrpc {
    httpFullNodeEnable = true
    httpFullNodePort = 50545
    httpSolidityEnable = true
    httpSolidityPort = 50555
    httpPBFTEnable = true
    httpPBFTPort = 50565
  }

node.disabledApi = [
    "getstatsinfo"
  ]

node {
  # trust node for solidity node
  # trustNode = "ip:port"
  trustNode = "127.0.0.1:50051"
  fullNodeAllowShieldedTransaction = true
  zenTokenId=1000001
  # expose extension api to public or not
  walletExtensionApi = true

  listen.port = 18889
  openTransactionSort=true
  # Number of gRPC thread, default availableProcessors / 2
  # rpc.thread = 16

  agreeNodeCount = 2
  connection.timeout = 2

  tcpNettyWorkThreadNum = 0

  udpNettyWorkThreadNum = 1

  # Number of validate sign thread, default availableProcessors / 2
  # validateSignThreadNum = 16

  connectFactor = 0.3
  activeConnectFactor = 0.1

  active = [
    # Initial active peers
    # Sample entries:
    "127.0.0.1:18889",
    "127.0.0.1:18892",
  ]

  maxActiveNodes = 30

  minParticipationRate = 0

  disconnectNumberFactor = 0.4
  maxConnectNumberFactor = 0.8
  receiveTcpMinDataLength = 2048
  isOpenFullTcpDisconnect = true

  p2p {
    version = 708 # 32: testnet; 101: debug
  }


 metrics{
  prometheus{
  enable=true
  port="9528"
  }
}


  http {
    fullNodePort = 8090
    solidityPort = 8091
    PBFTPort = 8098
    statisticsSRRewardSwitch = true
    fullNodeEnable = true
solidityEnable = true
  }

  rpc {
    port = 50051
    #solidityPort = 50061
    PBFTPort = 50071
    # This configuration takes effect only if db.version = 2,default value is 50061
    # solidityPort = 50061

    # Number of gRPC thread, default availableProcessors / 2
    # thread = 16

    # The maximum number of concurrent calls permitted for each incoming connection
    # maxConcurrentCallsPerConnection =

    # The HTTP/2 flow control window, default 1MB
    # flowControlWindow =

    # Connection being idle for longer than which will be gracefully terminated
    maxConnectionIdleInMillis = 60000

    # Connection lasting longer than which will be gracefully terminated
    # maxConnectionAgeInMillis =

    # The maximum message size allowed to be received on the server, default 4MB
    # maxMessageSize =

    # The maximum size of header list allowed to be received, default 8192
    # maxHeaderListSize =
    reflectionService=true
  }

  

}

